<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Reverse Django Lab{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<header class="topbar">
    <a href="{% url 'ticket_list' %}">Заявки</a>
    <a href="{% url 'ticket_search' %}">Поиск</a>
    {% if user.is_authenticated %}
        <a href="{% url 'ticket_create' %}">Создать</a>
        <a href="{% url 'profile_edit' %}">Профиль</a>
        <a href="{% url 'diagnostics' %}">Диагностика</a>
        <a href="{% url 'admin_console' %}">Admin Console</a>
        <form method="post" action="{% url 'logout' %}" class="inline-form">{% csrf_token %}<button type="submit">Выйти</button></form>
    {% else %}
        <a href="{% url 'login' %}">Войти</a>
        <a href="{% url 'signup' %}">Регистрация</a>
    {% endif %}
</header>
<main class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}<li class="{{ message.tags }}">{{ message }}</li>{% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</main>
<footer class="footer">
    Reverse Django Lab
</footer>
</body>
</html>
